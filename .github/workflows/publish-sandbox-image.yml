name: Publish Sandbox Image

# The sandbox image is independent of the application code — it only
# rebuilds when its own build context (or this workflow) changes.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "deploy/sandbox/**"
      - ".github/workflows/publish-sandbox-image.yml"

concurrency:
  group: publish-sandbox-image-${{ github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  sandbox:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # arm64 too: the image's home is a developer laptop (the drukbox
      # docker provider on Apple silicon), not just amd64 servers.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/druks-sandbox
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=long
            type=ref,event=tag
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: deploy/sandbox
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,scope=sandbox,mode=max
